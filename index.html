<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kallendar" />
  <meta name="theme-color" content="#161618" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Kallendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <header id="top-bar">

      <!-- Row 1 (display:contents on desktop, real flex row on portrait mobile) -->
      <div class="hdr-r1">
        <button id="hamburger-btn" class="icon-btn" aria-label="Toggle calendars sidebar" title="Calendars">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="2" y1="4.5" x2="16" y2="4.5"/>
            <line x1="2" y1="9" x2="16" y2="9"/>
            <line x1="2" y1="13.5" x2="16" y2="13.5"/>
          </svg>
        </button>

        <span class="app-logo"><span>Kalle</span>ndar</span>

        <div class="nav-group">
          <button id="prev-week" class="nav-btn" title="Previous" aria-label="Previous">&#8249;</button>
          <button id="today-btn" class="nav-btn" title="Go to today">Today</button>
          <button id="next-week" class="nav-btn" title="Next" aria-label="Next">&#8250;</button>
        </div>

        <div class="header-actions">
          <!-- Icon set by applyTheme() on load -->
          <button id="theme-toggle" class="icon-btn" title="Toggle dark mode" aria-label="Switch to dark mode"></button>
          <input type="file" id="file-input" accept=".ics,text/calendar" multiple hidden />
        </div>
      </div>

      <!-- Row 2 (display:contents on desktop, real flex row on portrait mobile) -->
      <div class="hdr-r2">
        <span id="week-range"></span>

        <select id="weeks-select" title="Weeks to display" aria-label="Weeks to display">
          <option value="1">1 week</option>
          <option value="2">2 weeks</option>
          <option value="3">3 weeks</option>
          <option value="4">4 weeks</option>
          <option value="5">5 weeks</option>
          <option value="6">6 weeks</option>
          <option value="8">8 weeks</option>
          <option value="10">10 weeks</option>
          <option value="12">12 weeks</option>
        </select>

        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input type="search" id="search-input" placeholder="Search events…" autocomplete="off" />
          <button id="search-clear" title="Clear search" aria-label="Clear search">&#10005;</button>
        </div>
      </div>

    </header>

    <!-- Main content -->
    <div id="main">

      <!-- Mobile sidebar backdrop -->
      <div id="sidebar-overlay" aria-hidden="true"></div>

      <!-- Sidebar: calendar list -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">Calendars</div>
          <button id="sidebar-share-btn" class="icon-btn" title="Copy shareable link" aria-label="Share calendars">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
          <button id="sidebar-close" class="icon-btn" aria-label="Close sidebar">&#10005;</button>
        </div>
        <ul id="calendar-list"></ul>
        <div class="sidebar-footer">
          <button class="sidebar-add-item" id="sidebar-import-file-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Import file
          </button>
          <button class="sidebar-add-item" id="sidebar-subscribe-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Subscribe to URL
          </button>
          <hr class="sidebar-divider" />
          <button class="sidebar-add-item" id="sidebar-export-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export settings
          </button>
          <button class="sidebar-add-item" id="sidebar-import-config-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Import settings
          </button>
          <input type="file" id="config-file-input" accept=".json,application/json" hidden />
        </div>
      </aside>

      <!-- Calendar area -->
      <div id="calendar-area">
        <div id="week-grid">
          <!-- Populated by app.js -->
        </div>
      </div>

    </div><!-- #main -->

  </div><!-- #app -->

  <!-- Event detail popup -->
  <div id="event-popup-overlay" role="presentation"></div>
  <div id="event-popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
    <div class="popup-header">
      <h2 id="popup-title"></h2>
      <button id="popup-close" aria-label="Close">&#10005;</button>
    </div>
    <div class="popup-cal-row">
      <span id="popup-cal-dot"></span>
      <span id="popup-cal-name"></span>
    </div>
    <div class="popup-body">
      <div class="popup-row">
        <span class="popup-icon">&#128337;</span>
        <span class="popup-field" id="popup-time"></span>
      </div>
      <div class="popup-row" id="popup-location-row">
        <span class="popup-icon">&#128205;</span>
        <span class="popup-field" id="popup-location"></span>
      </div>
      <div class="popup-row" id="popup-description-row">
        <span class="popup-icon">&#128221;</span>
        <span class="popup-field desc" id="popup-description"></span>
      </div>
    </div>
  </div>

  <!-- Subscribe-to-URL dialog -->
  <div id="subscribe-overlay" class="modal-overlay" role="presentation"></div>
  <div id="subscribe-dialog" class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="subscribe-title">
    <div class="modal-hdr">
      <h3 id="subscribe-title">Subscribe to Calendar</h3>
      <button id="subscribe-close" class="icon-btn" aria-label="Close">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="sub-url">iCal URL</label>
        <input type="url" id="sub-url" placeholder="https://… or webcal://…" autocomplete="off" spellcheck="false" />
        <span class="form-error" id="sub-url-err" role="alert"></span>
      </div>
      <div class="form-group">
        <label for="sub-name">Name <span class="form-optional">optional — auto-detected if blank</span></label>
        <input type="text" id="sub-name" placeholder="Work, Personal, Holidays…" autocomplete="off" maxlength="60" />
      </div>
      <div class="form-group">
        <label>Colour</label>
        <div id="sub-colors" class="color-picker" role="radiogroup" aria-label="Calendar colour"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="sub-cancel" class="btn-ghost">Cancel</button>
      <button id="sub-submit" class="btn-primary">
        <span id="sub-btn-label">Subscribe</span>
      </button>
    </div>
  </div>

  <script src="ical-parser.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
