<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kallendar" />
  <meta name="theme-color" content="#161618" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Kallendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <header id="top-bar">
      <button id="hamburger-btn" class="icon-btn" aria-label="Toggle calendars sidebar" title="Calendars">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="2" y1="4.5" x2="16" y2="4.5"/>
          <line x1="2" y1="9" x2="16" y2="9"/>
          <line x1="2" y1="13.5" x2="16" y2="13.5"/>
        </svg>
      </button>

      <span class="app-logo"><span>Kalle</span>ndar</span>

      <div class="nav-group">
        <button id="prev-week" class="nav-btn" title="Previous" aria-label="Previous">&#8249;</button>
        <button id="today-btn" class="nav-btn" title="Go to today">Today</button>
        <button id="next-week" class="nav-btn" title="Next" aria-label="Next">&#8250;</button>
      </div>

      <span id="week-range"></span>

      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="search" id="search-input" placeholder="Search events…" autocomplete="off" />
        <button id="search-clear" title="Clear search" aria-label="Clear search">&#10005;</button>
      </div>

      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn" title="Toggle dark mode" aria-label="Switch to dark mode">☀</button>
        <input type="file" id="file-input" accept=".ics,text/calendar" multiple hidden />
        <button id="import-btn">+ <span class="import-label">Import .ics</span></button>
      </div>
    </header>

    <!-- Main content -->
    <div id="main">

      <!-- Mobile sidebar backdrop -->
      <div id="sidebar-overlay" aria-hidden="true"></div>

      <!-- Sidebar: calendar list -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">Calendars</div>
          <button id="sidebar-close" class="icon-btn" aria-label="Close sidebar">&#10005;</button>
        </div>
        <ul id="calendar-list"></ul>
      </aside>

      <!-- Calendar area -->
      <div id="calendar-area">
        <div id="week-grid">
          <!-- Populated by app.js -->
        </div>
      </div>

    </div><!-- #main -->

  </div><!-- #app -->

  <!-- Event detail popup -->
  <div id="event-popup-overlay" role="presentation"></div>
  <div id="event-popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
    <div class="popup-header">
      <h2 id="popup-title"></h2>
      <button id="popup-close" aria-label="Close">&#10005;</button>
    </div>
    <div class="popup-cal-row">
      <span id="popup-cal-dot"></span>
      <span id="popup-cal-name"></span>
    </div>
    <div class="popup-body">
      <div class="popup-row">
        <span class="popup-icon">&#128337;</span>
        <span class="popup-field" id="popup-time"></span>
      </div>
      <div class="popup-row" id="popup-location-row">
        <span class="popup-icon">&#128205;</span>
        <span class="popup-field" id="popup-location"></span>
      </div>
      <div class="popup-row" id="popup-description-row">
        <span class="popup-icon">&#128221;</span>
        <span class="popup-field desc" id="popup-description"></span>
      </div>
    </div>
  </div>

  <script src="ical-parser.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
